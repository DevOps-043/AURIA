name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Solo un release a la vez
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ─── Paso 1: Verificar si ya existe el release ───
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      exists: ${{ steps.check_release.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASES_TOKEN }}

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo DevOps-043/AQELOR-releases > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # ─── Paso 2: Build Windows ───
  build-and-release:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASES_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build Electron app (compile)
        run: npm run build --workspace=apps/desktop

      - name: Package Windows installer (.exe)
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: npx electron-builder --win --config apps/desktop/electron-builder.json5 --project apps/desktop

      - name: List build output
        run: |
          echo "=== Build artifacts ==="
          Get-ChildItem -Recurse apps/desktop/release/ | Select-Object FullName
        shell: pwsh

      - name: Create release in AQELOR-releases
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.version }}"

          # Extraer novedades del CHANGELOG para esta version
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1 2>/dev/null || true)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="AQELOR v${VERSION} - Windows Release"
          fi

          # Buscar archivos del build
          echo "=== Artifacts ==="
          find apps/desktop/release/ -type f -name "*.exe" -o -name "*.blockmap" -o -name "latest.yml" | head -20
          echo "================="

          # Crear release y subir archivos
          gh release create "v${VERSION}" \
            --repo DevOps-043/AQELOR-releases \
            --title "AQELOR v${VERSION}" \
            --notes "$NOTES" \
            apps/desktop/release/${VERSION}/*.exe \
            apps/desktop/release/${VERSION}/*.yml \
            apps/desktop/release/${VERSION}/*.blockmap
